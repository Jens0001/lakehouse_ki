connector.name=iceberg
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v2
iceberg.nessie-catalog.default-warehouse-dir=s3://lakehouse/
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin123
s3.region=us-east-1
# === Metadata-Bloat vermeiden ===

# Alte Metadata-JSON-Versionen begrenzen (Default: 100!)
# Sehr niedrig für Dev um Speicher zu sparen bei vielen Writes
iceberg.max-previous-versions=2

# Expire Snapshots: Sehr aggressiv für lokale Dev
# Default 7d – hier 12h um schnell zu bereinigen
iceberg.expire-snapshots.min-retention=12h

# Remove Orphan Files: Aggressiv
# Default 1d – hier 6h für schnellere Bereinigung
iceberg.remove-orphan-files.min-retention=6h