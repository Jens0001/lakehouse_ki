connector.name=iceberg
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v2
iceberg.nessie-catalog.default-warehouse-dir=s3://lakehouse/
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin123
s3.region=us-east-1
# === Metadata-Bloat vermeiden ===

# Alte Metadata-JSON-Versionen begrenzen (Default: 100!)
# Conservative: 10 Versionen behalten (war zu aggressiv mit 2)
iceberg.max-previous-versions=10

# Expire Snapshots: Conservative für Produktion
# Default 7d – beibeihalten um Metadaten zu schützen
iceberg.expire-snapshots.min-retention=1d

# Remove Orphan Files: Standard-Retention
# Default 1d – reicht aus
iceberg.remove-orphan-files.min-retention=1d