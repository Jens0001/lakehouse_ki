# Trino Server Configuration

# Node configuration (required)
node.environment=production

# Coordinator configuration - this is the coordinator node
coordinator=true
node-scheduler.include-coordinator=true

# Network configuration
http-server.http.port=8080
http-server.http.enabled=true
http-server.https.enabled=true
http-server.https.port=8443
http-server.https.keystore.path=/etc/trino/trino-keystore.jks
http-server.https.keystore.key=trino123

# Query processing configuration
query.max-memory=4GB
query.max-total-memory=8GB

# Task configuration
task.concurrency=8

# Exchange configuration (for distributed queries)
exchange.http-client.max-connections-per-server=32

# OAuth2 / OIDC Authentication via Keycloak
http-server.authentication.type=OAUTH2
http-server.authentication.oauth2.issuer=http://keycloak:8082/realms/lakehouse
http-server.authentication.oauth2.client-id=trino
http-server.authentication.oauth2.client-secret=${ENV:KEYCLOAK_CLIENT_SECRET}
http-server.authentication.oauth2.scopes=openid
http-server.authentication.oauth2.principal-field=preferred_username

# Allow OAuth2 over HTTP (development only!)
http-server.authentication.allow-insecure-over-http=true

# Internal communication shared secret (required when authentication is enabled)
internal-communication.shared-secret=vNo85iJeG2cHDBTGhHZrnrc4b9TJpl4lH4rG9SdsIPI=

# Web UI Authentication
web-ui.authentication.type=OAUTH2


