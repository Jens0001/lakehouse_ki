# Nessie Catalog Configuration
# Aktiviert die Iceberg REST API unter /iceberg/v1/*
# PyIceberg verbindet sich als REST-Catalog gegen diesen Endpoint.
#
# Änderungen erfordern einen Nessie-Neustart:
#   docker compose restart nessie

# Warehouse: S3-Pfad wo Iceberg-Tabellendaten gespeichert werden
nessie.catalog.default-warehouse=warehouse
nessie.catalog.warehouses.warehouse.location=s3://lakehouse/

# MinIO S3-Konfiguration für den Nessie Catalog Service
# Credentials werden über AWS-Standard-Env-Vars gesetzt (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)
nessie.catalog.service.s3.default-options.region=us-east-1
nessie.catalog.service.s3.default-options.endpoint=http://minio:9000
nessie.catalog.service.s3.default-options.path-style-access=true
nessie.catalog.service.s3.default-options.auth-type=APPLICATION_GLOBAL
