version: 2

models:
  - name: stg_weather
    description: >
      Ephemeres Staging-Modell für Open-Meteo Wetterdaten.
      Berechnet Hash-Keys (Data Vault), bereinigt Typen und filtert ungültige Zeilen.
      Wird nicht materialisiert, sondern direkt als CTE in downstream-Modelle eingefügt.
    columns:
      - name: location_hk
        description: "MD5-Hashkey auf location_key – primärer Hub-Key für den Standort"
      - name: location_hashdiff
        description: "MD5-Hashdiff auf (location_key, latitude, longitude) – prüft ob sich Standortattribute geändert haben"
      - name: weather_hashdiff
        description: "MD5-Hashdiff auf (location_key, timestamp) – eindeutiger Bezeichner je Messung"
      - name: measured_at
        description: "Messzeitpunkt (timestamp, Europe/Berlin)"
      - name: date_key
        description: "Datum der Messung (Partitionierungsspalte aus der Rohtabelle)"
      - name: hour
        description: "Stunde des Tages (0–23)"
      - name: location_key
        description: "Lesbarer Standortbezeichner (z.B. 'berlin-reinickendorf')"
      - name: latitude
        description: "Geografische Breite (double)"
      - name: longitude
        description: "Geografische Länge (double)"
      - name: temperature_2m
        description: "Temperatur 2m über Boden in °C"
      - name: apparent_temperature
        description: "Gefühlte Temperatur in °C"
      - name: precipitation
        description: "Niederschlag in mm"
      - name: windspeed_10m
        description: "Windgeschwindigkeit 10m über Boden in km/h"
      - name: weathercode
        description: "WMO-Wettercode (integer)"
      - name: relative_humidity_2m
        description: "Relative Luftfeuchtigkeit 2m über Boden in %"
      - name: _source_file
        description: "Pfad zur JSON-Quelldatei in der MinIO Landing Zone"
      - name: _loaded_at
        description: "Zeitstempel des Ladevorgangs in die Rohtabelle (UTC)"
      - name: record_source
        description: "Datenquelle, fest 'open-meteo'"

  - name: stg_energy_price
    description: >
      Ephemeres Staging-Modell für Energy-Charts Day-Ahead-Spotpreise.
      Berechnet Hash-Keys (Data Vault), bereinigt Typen und filtert ungültige Zeilen.
      Wird nicht materialisiert, sondern direkt als CTE in downstream-Modelle eingefügt.
    columns:
      - name: price_zone_hk
        description: "MD5-Hashkey auf bidding_zone – primärer Hub-Key für die Gebotszone"
      - name: price_hashdiff
        description: "MD5-Hashdiff auf (bidding_zone, timestamp) – eindeutiger Bezeichner je Stunde und Zone"
      - name: measured_at
        description: "Messzeitpunkt (UTC-basiert aus unix_seconds)"
      - name: date_key
        description: "Datum der Messung (Partitionierungsspalte aus der Rohtabelle)"
      - name: hour
        description: "Stunde des Tages (0–23)"
      - name: bidding_zone
        description: "Gebotszone (z.B. 'DE-LU')"
      - name: price_eur_mwh
        description: "Day-Ahead-Spotpreis in EUR/MWh (kann NULL oder negativ sein)"
      - name: _source_file
        description: "Pfad zur JSON-Quelldatei in der MinIO Landing Zone"
      - name: _loaded_at
        description: "Zeitstempel des Ladevorgangs in die Rohtabelle (UTC)"
      - name: record_source
        description: "Datenquelle, fest 'energy-charts'"
