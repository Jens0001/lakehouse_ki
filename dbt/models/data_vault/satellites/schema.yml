version: 2

models:
  - name: s_location_details
    description: >
      Data Vault Satellit mit beschreibenden Attributen des Messstandorts.
      Historisiert via location_hashdiff: neue Row wird nur geschrieben,
      wenn sich Koordinaten oder Name geändert haben (SCD2-Logik).
    columns:
      - name: location_hk
        description: "MD5-Hashkey auf location_key – Fremdschlüssel zu h_location"
        tests:
          - not_null
          - relationships:
              to: ref('h_location')
              field: location_hk
      - name: location_hashdiff
        description: "MD5-Hashdiff auf (location_key, latitude, longitude) – eindeutiger Bezeichner einer Attributkombination"
        tests:
          - not_null
          - unique
      - name: location_key
        description: "Lesbarer Standortbezeichner (z.B. 'berlin-reinickendorf')"
        tests:
          - not_null
      - name: latitude
        description: "Geografische Breite (double)"
        tests:
          - not_null
      - name: longitude
        description: "Geografische Länge (double)"
        tests:
          - not_null
      - name: load_date
        description: "Zeitpunkt des Ladens dieser Attributversion (_loaded_at)"
        tests:
          - not_null
      - name: record_source
        description: "Herkunftssystem, fest 'open-meteo'"
        tests:
          - not_null

  - name: s_weather_hourly
    description: >
      Data Vault Satellit mit stündlichen Messwerten je Standort.
      Jede eindeutige Kombination aus Standort und Zeitstempel ergibt eine Row.
      Historisiert via weather_hashdiff – keine Updates, nur Inserts.
    columns:
      - name: location_hk
        description: "MD5-Hashkey auf location_key – Fremdschlüssel zu h_location"
        tests:
          - not_null
          - relationships:
              to: ref('h_location')
              field: location_hk
      - name: weather_hashdiff
        description: "MD5-Hashdiff auf (location_key, timestamp) – Primärschlüssel des Satelliten"
        tests:
          - not_null
          - unique
      - name: measured_at
        description: "Messzeitpunkt (timestamp, Europe/Berlin)"
        tests:
          - not_null
      - name: date_key
        description: "Datum der Messung"
        tests:
          - not_null
      - name: hour
        description: "Stunde der Messung (0–23)"
        tests:
          - not_null
      - name: temperature_2m
        description: "Temperatur 2m über Boden in °C"
      - name: apparent_temperature
        description: "Gefühlte Temperatur in °C (berücksichtigt Wind, Luftfeuchtigkeit)"
      - name: precipitation
        description: "Niederschlag in mm (Stundensumme)"
      - name: windspeed_10m
        description: "Windgeschwindigkeit 10m über Boden in km/h"
      - name: weathercode
        description: "WMO-Wettercode (0 = wolkenlos, 95+ = Gewitter)"
      - name: relative_humidity_2m
        description: "Relative Luftfeuchtigkeit 2m über Boden in %"
      - name: _source_file
        description: "Pfad zur Quelldatei in der Landing Zone"
      - name: load_date
        description: "Ladezeitpunkt (_loaded_at aus der Rohtabelle)"
        tests:
          - not_null
      - name: record_source
        description: "Herkunftssystem, fest 'open-meteo'"
        tests:
          - not_null

  - name: s_energy_price_hourly
    description: >
      Data Vault Satellit mit stündlichen Day-Ahead-Spotpreisen je Gebotszone.
      Jede eindeutige Kombination aus Zone und Zeitstempel ergibt eine Row.
      Historisiert via price_hashdiff – keine Updates, nur Inserts (append-only).
      Negative Preise und NULL-Werte werden 1:1 übernommen.
    columns:
      - name: price_zone_hk
        description: "MD5-Hashkey auf bidding_zone – Fremdschlüssel zu h_price_zone"
        tests:
          - not_null
          - relationships:
              to: ref('h_price_zone')
              field: price_zone_hk
      - name: price_hashdiff
        description: "MD5-Hashdiff auf (bidding_zone, timestamp) – Primärschlüssel des Satelliten"
        tests:
          - not_null
          - unique
      - name: measured_at
        description: "Messzeitpunkt (UTC-basiert aus unix_seconds)"
        tests:
          - not_null
      - name: date_key
        description: "Datum der Messung (Partitionierungsspalte)"
        tests:
          - not_null
      - name: hour
        description: "Stunde der Messung (0–23, UTC)"
        tests:
          - not_null
      - name: price_eur_mwh
        description: "Day-Ahead-Spotpreis in EUR/MWh (kann NULL oder negativ sein)"
      - name: _source_file
        description: "Pfad zur Quelldatei in der Landing Zone"
      - name: load_date
        description: "Ladezeitpunkt (_loaded_at aus der Rohtabelle)"
        tests:
          - not_null
      - name: record_source
        description: "Herkunftssystem, fest 'energy-charts'"
        tests:
          - not_null
