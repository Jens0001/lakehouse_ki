name: 'lakehouse_ki'
version: '1.0.0'
config-version: 2

profile: 'lakehouse_ki'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  lakehouse_ki:
    +views_enabled: false
    # Staging: ephemeral (keine physischen Tabellen, nur CTEs)
    staging:
      materialized: ephemeral
      +schema: staging
    # Data Vault 2.0: incremental (Historisierung)
    data_vault:
      materialized: incremental
      +schema: data_vault
      hubs:
        +tags: ['hub']
      links:
        +tags: ['link']
      satellites:
        +tags: ['satellite']
    # Business Vault: table (Star Schemas)
    business_vault:
      materialized: table
      +schema: business_vault
    # Marts: table (Use-Case-spezifisch)
    marts:
      materialized: table
      +schema: marts