source:
  type: dbt
  # dbt ist kein eigener OM-Service – es reichert den bestehenden Trino-Service an.
  # serviceName muss exakt dem in OM angelegten Database-Service entsprechen.
  serviceName: lakehouse_trino
  serviceConnection:
    config:
      type: Trino
      hostPort: trino:8080
      username: admin
      catalog: iceberg
  sourceConfig:
    config:
      type: DBT
      # Dateipfade im openmetadata-ingestion-Container (Volume-Mount: dbt/target -> /opt/dbt/target)
      dbtConfigSource:
        dbtConfigType: local
        # manifest.json: Modell-DAG, Spalten, Tests, Tags, Beschreibungen
        dbtManifestFilePath: /opt/dbt/target/manifest.json
        # catalog.json: Spalten-Typen und Row-Counts – wird täglich vom DAG erzeugt
        dbtCatalogFilePath: /opt/dbt/target/catalog.json
        # run_results.json: Ergebnisse des letzten dbt-Laufs inkl. Test-Status
        dbtRunResultsFilePath: /opt/dbt/target/run_results.json
      # Beschreibungen aus dbt schema.yml in OM-Entities übernehmen
      dbtUpdateDescriptions: true
      # dbt-Tags als OM-Classification-Tags anlegen
      includeTags: true
sink:
  type: metadata-rest
  config: {}
