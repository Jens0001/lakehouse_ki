# Dremio Minimal Configuration
# Using only essential properties supported across Dremio versions

# Services
services {
  coordinator.enabled = true
  executor.enabled = true
  web.enabled = true
}

# Web UI
web {
  port = 9047
}

# Paths (minimal)
paths {
  spilling = [ "/opt/dremio/data/spill" ]
}

# Provisioning
provisioning {
  cache.path = /opt/dremio/cache
}
